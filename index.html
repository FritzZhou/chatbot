<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Inquiry Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body>

  <!-- ===================== SPLASH ===================== -->
  <div class="splash" id="splash">
    <div class="splash-orb">
      <img src="LCCDO (1).webp" alt="" onerror="this.style.display='none'">
    </div>
    <p class="splash-title">Lourdes College Inquiry Assistant</p>
    <div class="splash-bar"><span></span></div>
  </div>

  <div class="app">
    <div class="container" id="container">

      <!-- ===================== HEADER ===================== -->
      <header class="header">
        <div class="avatar-orb">
          <img src="lclogo.png" alt="School logo" onerror="this.style.display='none'">
        </div>
        <div class="header-text">
          <h1>School Inquiry Assistant</h1>
          <div class="header-status">
            <span class="status-dot"></span>
            <span>Online · replies instantly</span>
          </div>
        </div>

        <button class="header-icon-btn" type="button" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4.2"/>
            <path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/>
          </svg>
          <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.7 14.9A8.7 8.7 0 1 1 9.1 3.3a7 7 0 0 0 11.6 11.6Z"/>
          </svg>
        </button>

        <button class="header-icon-btn" type="button" id="moreBtn" aria-label="More options" title="More options">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="5" cy="12" r="1.6" fill="currentColor"/>
            <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
            <circle cx="19" cy="12" r="1.6" fill="currentColor"/>
          </svg>
        </button>
      </header>

      <!-- ===================== SETTINGS PANEL ===================== -->
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-row">
          <span>Appearance</span>
          <div class="settings-toggle-group">
            <button type="button" class="seg-btn" data-mode="light">Light</button>
            <button type="button" class="seg-btn" data-mode="dark">Dark</button>
          </div>
        </div>
        <div class="settings-row">
          <span>Typing animation</span>
          <label class="switch">
            <input type="checkbox" id="typingFxToggle" checked>
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </label>
        </div>
        <p class="settings-about">School Inquiry Assistant answers common questions about enrollment, tuition, schedules, scholarships and more — instantly, any time of day.</p>
      </div>

      <!-- ===================== CHAT LOG ===================== -->
      <div class="chat-display" id="chatDisplay"></div>

      <!-- ===================== QUICK TOPICS ===================== -->
      <div class="quick-topics" id="quickTopics">
        <button class="topic-chip" data-topic="What are the tuition fees?">💳 Tuition</button>
        <button class="topic-chip" data-topic="How do I enroll?">📝 Enrollment</button>
        <button class="topic-chip" data-topic="What is the class schedule?">🗓️ Schedule</button>
        <button class="topic-chip" data-topic="Tell me about scholarships">🎓 Scholarships</button>
        <button class="topic-chip" data-topic="How do I contact the school?">📞 Contact</button>
      </div>

      <!-- ===================== INPUT BAR ===================== -->
      <div class="input-area">
        <div class="input-shell">
          <textarea
            id="userInput"
            class="input-field"
            placeholder="Message the assistant…"
            rows="1"
            aria-label="Type your question"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
